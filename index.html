<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CELPIP Trainer</title>
<style>
:root {
  --bg:#fff6ea; --s1:#fffdf8; --s2:#fff1df; --s3:#f7dfc8;
  --border:#e9c8aa; --accent:#f47c5c; --accent-glow:#f47c5c26;
  --teal:#43b895; --teal-glow:#43b89522;
  --gold:#d9962f; --red:#e85f6b; --green:#3fa76b;
  --t1:#3b2a25; --t2:#7e5f53; --t3:#b28b7d;
  --radius:14px; --radius-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:linear-gradient(180deg,#fff9f0 0%,var(--bg) 55%,#ffe9d6 100%);color:var(--t1);font-family:var(--font);overflow-x:hidden}

#shell{display:flex;flex-direction:column;min-height:100dvh;max-width:520px;margin:0 auto}

/* nav */
#topnav{
  position:sticky;top:0;z-index:50;
  background:#fff9f0e8;backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-brand{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.nav-brand::before{content:'🐾';font-size:14px}
.nav-brand span{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:8px}
.pill{
  display:flex;align-items:center;gap:4px;
  border-radius:20px;padding:5px 10px;
  font-size:12px;font-weight:700;
}
.pill-streak{background:var(--s2);border:1px solid var(--border);color:var(--gold)}
.pill-level{background:var(--accent)22;border:1px solid var(--accent)44;color:var(--accent)}
.sync-dot{
  width:7px;height:7px;border-radius:50%;background:var(--t3);
  transition:background .3s;
}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.busy{background:var(--gold);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.auth-btn{background:var(--s2);border:1px solid var(--border);border-radius:20px;color:var(--t2);font-size:11px;font-weight:800;padding:6px 10px;cursor:pointer}
.auth-btn:hover{border-color:var(--accent);color:var(--accent)}
.auth-email{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* auth */
#authGate{display:none;min-height:100dvh;align-items:center;justify-content:center;padding:22px;background:linear-gradient(180deg,#fff9f0 0%,var(--bg) 55%,#ffe9d6 100%)}
#authGate.show{display:flex}
.auth-card{width:100%;max-width:380px;background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:22px;box-shadow:0 18px 45px #d9962f22}
.auth-mark{font-size:42px;text-align:center;margin-bottom:8px}
.auth-title{font-size:24px;font-weight:900;text-align:center;margin-bottom:5px;color:var(--t1)}
.auth-copy{font-size:13px;line-height:1.6;color:var(--t2);text-align:center;margin-bottom:16px}
.auth-form{display:flex;flex-direction:column;gap:9px}
.auth-form input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px;color:var(--t1);font-size:14px}
.auth-form input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.auth-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.auth-note{font-size:12px;color:var(--t3);line-height:1.5;margin-top:10px;text-align:center}
.auth-msg{display:none;font-size:12px;line-height:1.5;border-radius:var(--radius-sm);padding:10px;margin-top:10px}
.auth-msg.ok{display:block;color:var(--green);background:#eaf8ee;border:1px solid #bfe7cc}
.auth-msg.no{display:block;color:var(--red);background:#fff0f1;border:1px solid #f3bcc3}

/* main scroll area */
#main{flex:1;padding:16px 16px 90px;overflow-y:auto}

/* tab bar */
#tabbar{
  position:sticky;bottom:0;
  background:#fffdf8f2;backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(3,1fr);
  padding:8px 0 max(8px,env(safe-area-inset-bottom));
}
.tab-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:6px;
  color:var(--t3);font-size:10px;font-weight:600;transition:color .2s;
}
.tab-btn .icon{font-size:20px;line-height:1}
.tab-btn.active{color:var(--accent)}

/* cards */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card.glow{border-color:var(--accent);box-shadow:0 0 18px var(--accent-glow)}
.card.teal{border-color:var(--teal);box-shadow:0 0 18px var(--teal-glow)}

/* section label */
.sec{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin:14px 0 9px}

/* xp bar */
.xp-wrap{margin-bottom:14px}
.xp-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:5px}
.xp-meta span:last-child{color:var(--teal);font-weight:700}
.xp-track{height:7px;background:var(--s3);border-radius:4px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold),var(--teal));border-radius:4px;transition:width .8s cubic-bezier(.25,1,.5,1)}

/* stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--s2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 6px;text-align:center}
.stat-n{font-size:20px;font-weight:800;line-height:1;margin-bottom:2px}
.stat-l{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t3)}

/* week strip */
.week{display:flex;gap:5px;margin-bottom:14px}
.wday{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wday .dl{font-size:9px;color:var(--t3)}
.wday .dp{width:100%;height:5px;border-radius:3px;background:var(--s3)}
.wday.done .dp{background:var(--accent)}
.wday.today .dp{background:var(--teal);animation:pb 2s infinite}
@keyframes pb{0%,100%{opacity:1}50%{opacity:.4}}

/* session cards */
.sc{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;
  position:relative;overflow:hidden;transition:border-color .2s,background .2s;
}
.sc.active{border-color:var(--accent);background:var(--s2);cursor:pointer}
.sc.active::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,var(--accent)09,transparent);
  animation:sh 3s infinite;
}
@keyframes sh{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.sc.done{border-color:var(--green)44;background:#eaf8ee}
.sc.locked{opacity:.38;cursor:not-allowed}
.sc-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--s3)}
.sc.active .sc-icon{background:var(--accent)22}
.sc.done .sc-icon{background:var(--green)22}
.sc-body{flex:1;min-width:0}
.sc-title{font-size:14px;font-weight:600;margin-bottom:2px}
.sc-desc{font-size:12px;color:var(--t2);line-height:1.4}
.sc.locked .sc-title,.sc.locked .sc-desc{color:var(--t3)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.b-time{background:var(--s3);color:var(--t2)}
.b-locked{background:var(--s3);color:var(--t3)}
.b-done{background:var(--green)22;color:var(--green)}
.b-active{background:var(--accent)22;color:var(--accent)}

/* buttons */
.btn{width:100%;padding:14px;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.98)}
.btn-p{background:linear-gradient(135deg,var(--accent),#ffb36b);color:#fffdf8;box-shadow:0 8px 18px #f47c5c22}
.btn-p:disabled{opacity:.3;cursor:not-allowed}
.btn-o{background:transparent;color:var(--t2);border:1px solid var(--border)}
.btn-o:hover{border-color:var(--accent);color:var(--t1)}

/* quiz panel */
#qpanel{display:none}
#qpanel.open{display:block}

.qtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.qtag{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--teal)}
.qclose{background:var(--s2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t2);cursor:pointer}

.pbar{display:flex;align-items:center;gap:8px;margin-bottom:13px}
.pt{flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.plbl{font-size:11px;color:var(--t3);white-space:nowrap}

.wcard{background:var(--s2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:13px;text-align:center}
.wen{font-size:26px;font-weight:800;margin-bottom:3px}
.wpos{font-size:11px;color:var(--accent);font-style:italic;margin-bottom:5px}
.wzh{font-size:14px;color:var(--t2);margin-bottom:7px}
.wex{font-size:12px;color:var(--t3);line-height:1.6;font-style:italic}

.qtext{font-size:14px;color:var(--t1);line-height:1.6;margin-bottom:11px}
.qhead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:11px}
.qhead .qtext{margin-bottom:0;flex:1}

.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:12px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--t1);font-size:14px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:border-color .15s,background .15s}
.opt:hover:not(:disabled){border-color:var(--accent);background:var(--s3)}
.opt.correct{border-color:var(--green);background:var(--green)18;color:var(--green)}
.opt.wrong{border-color:var(--red);background:var(--red)18;color:var(--red)}
.opt:disabled{cursor:default}
.ol{width:24px;height:24px;border-radius:6px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.opt.correct .ol{background:var(--green)33}
.opt.wrong .ol{background:var(--red)33}

.fb{display:none;margin-top:10px;padding:11px 13px;border-radius:var(--radius-sm);font-size:13px;line-height:1.5}
.fb.ok{background:var(--green)18;color:var(--green);border:1px solid var(--green)33;display:block}
.fb.no{background:var(--red)18;color:var(--red);border:1px solid var(--red)33;display:block}

.nxt{width:100%;margin-top:11px;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;display:none}

.study-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.study-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:left}
.study-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.study-word{font-size:22px;font-weight:800;line-height:1.1}
.study-meta{font-size:11px;color:var(--accent);font-style:italic;margin-top:3px}
.study-zh{font-size:13px;color:var(--t2);margin-bottom:7px}
.study-ex{font-size:12px;color:var(--t3);line-height:1.6;font-style:italic}
.audio-row{display:flex;gap:6px;flex-shrink:0}
.speak-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--s3);color:var(--t1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;line-height:1;transition:border-color .15s,background .15s}
.speak-btn:hover{border-color:var(--accent);background:var(--accent)22}

/* reading */
.passage{background:var(--s2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:13px}
.ptitle{font-size:14px;font-weight:700;margin-bottom:9px;color:var(--teal)}
.pbody{font-size:13px;color:var(--t2);line-height:1.75}
.pbody p+p{margin-top:9px}
.passage-intro{font-style:italic;margin-bottom:10px}
.passage-comment{padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--t2);line-height:1.6}
.passage-comment:last-child{border-bottom:none}
.commenter{font-weight:700;color:var(--t1);margin-right:4px}
.passage-table-wrap{overflow-x:auto;margin-bottom:10px}
.passage-table{width:100%;border-collapse:collapse;font-size:12px}
.passage-table th{background:var(--s3,#2a2a3a);color:var(--teal);padding:6px 8px;text-align:left;border:1px solid var(--border)}
.passage-table td{padding:5px 8px;border:1px solid var(--border);color:var(--t2)}
.passage-table tr:nth-child(even) td{background:var(--s2)}
.passage-notes{font-size:12px;color:var(--t2);margin-top:6px}
.passage-notes ul{margin:4px 0 0 16px;padding:0}
.passage-notes li{margin-bottom:3px;line-height:1.5}

/* writing */
.wsit{background:var(--s2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:11px}
.wsit strong{display:block;font-size:13px;color:var(--teal);margin-bottom:5px}
.wsit p{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:7px}
.wsit ul{padding-left:16px}
.wsit li{font-size:13px;color:var(--t2);margin-bottom:3px}
.whint{font-size:11px;color:var(--t3);margin-bottom:7px;display:flex;gap:12px}
textarea{width:100%;min-height:150px;background:var(--s2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--t1);font-size:14px;padding:12px;font-family:var(--font);line-height:1.6;resize:vertical;transition:border-color .2s}
textarea:focus{outline:none;border-color:var(--accent)}
textarea::placeholder{color:var(--t3)}
.wcrow{display:flex;justify-content:space-between;align-items:center;margin:5px 0 11px}
.wc{font-size:11px;color:var(--t3)}
.wc.warn{color:var(--gold)}
.wc.good{color:var(--green)}

/* score */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:11px 0}
.scell{background:var(--s2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px;text-align:center}
.sdim{font-size:10px;color:var(--t3);margin-bottom:4px;line-height:1.3}
.sn{font-size:22px;font-weight:800;line-height:1}
.sn .of{font-size:12px;color:var(--t3);font-weight:400}
.sn.hi{color:var(--green)}.sn.mid{color:var(--gold)}.sn.lo{color:var(--red)}
.stot{text-align:center;background:var(--s3);border-radius:var(--radius-sm);padding:12px;margin-bottom:11px}
.stot .n{font-size:32px;font-weight:900}
.stot .of{font-size:14px;color:var(--t3)}
.stot .lbl{font-size:10px;color:var(--t3);margin-top:2px}
.tip{background:var(--s2);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:6px}
.mrow{background:var(--s2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;margin-bottom:7px}
.mtop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.mkind{font-size:11px;font-weight:800;color:var(--accent)}
.mdate{font-size:10px;color:var(--t3);white-space:nowrap}
.mdetail{font-size:12px;color:var(--t2);line-height:1.5}

/* all done */
.alldone{background:linear-gradient(135deg,var(--accent)18,var(--teal)18);border:1px solid var(--accent)44;border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:14px}
.alldone .e{font-size:34px;margin-bottom:7px}
.alldone h3{font-size:16px;font-weight:800;margin-bottom:4px}
.alldone p{font-size:13px;color:var(--t2)}

/* progress tab */
.lv-track{height:10px;background:var(--s3);border-radius:5px;overflow:hidden;margin:8px 0}
.lv-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));border-radius:5px;transition:width .8s cubic-bezier(.25,1,.5,1)}
.lvbadges{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}
.lvb{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center}
.lvb.ok{border-color:var(--accent)66;background:var(--accent)11}
.lvb .li{font-size:18px;margin-bottom:2px}
.lvb .ln{font-size:9px;color:var(--t3)}
.lvb.ok .ln{color:var(--accent)}

.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.cc{aspect-ratio:1;border-radius:4px;background:var(--s3)}
.cc.full{background:var(--accent)}

/* vocab tab */
.cattabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:11px;scrollbar-width:none}
.cattabs::-webkit-scrollbar{display:none}
.ctab{flex-shrink:0;padding:6px 12px;background:var(--s2);border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:600;color:var(--t3);cursor:pointer;transition:all .2s}
.ctab.active{background:var(--accent)22;border-color:var(--accent);color:var(--accent)}
.vrow{background:var(--s2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;display:flex;align-items:center;gap:12px;margin-bottom:7px}
.vword{font-size:14px;font-weight:700;flex:1}
.vzh{font-size:12px;color:var(--t2);margin-top:2px}
.vdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dn{background:var(--t3)}.dr{background:var(--gold)}.dm{background:var(--green)}

/* reward overlay */
#overlay{display:none;position:fixed;inset:0;z-index:200;background:#5d403780;align-items:center;justify-content:center;padding:20px}
#overlay.show{display:flex}
.rcard{background:var(--s1);border:1px solid var(--accent)55;border-radius:20px;padding:30px 24px;text-align:center;max-width:320px;width:100%;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.re{font-size:54px;margin-bottom:10px}
.rt{font-size:20px;font-weight:800;margin-bottom:5px}
.rx{display:inline-block;background:var(--accent)22;color:var(--accent);padding:4px 14px;border-radius:20px;font-size:15px;font-weight:800;margin-bottom:9px}
.rm{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:18px}

/* confetti */
#cnf{position:fixed;inset:0;pointer-events:none;z-index:199;overflow:hidden}
.cp{position:absolute;top:-10px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="cnf"></div>

<div id="authGate">
  <div class="auth-card">
    <div class="auth-mark">🐱</div>
    <div class="auth-title">CELPIP Cat Coach</div>
    <div class="auth-copy">Sign in to sync your vocabulary progress across devices.</div>
    <div class="auth-form">
      <input id="authEmail" type="email" placeholder="Email" autocomplete="email">
      <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password">
      <button class="btn btn-p" style="margin:0" onclick="signInEmail()">Sign In</button>
      <div class="auth-actions">
        <button class="btn btn-o" style="margin:0" onclick="signUpEmail()">Create Account</button>
        <button class="btn btn-o" style="margin:0" onclick="sendMagicLink()">Magic Link</button>
      </div>
    </div>
    <div id="authMsg" class="auth-msg"></div>
    <div class="auth-note">Your current browser progress will be uploaded to the account the first time you sign in.</div>
  </div>
</div>

<div id="overlay">
  <div class="rcard">
    <div class="re" id="rE">🎉</div>
    <div class="rt" id="rT">Done!</div>
    <div class="rx" id="rX">+40 XP</div>
    <div class="rm" id="rM"></div>
    <button class="btn btn-p" style="margin:0" onclick="closeReward()">Continue →</button>
  </div>
</div>

<div id="shell">
  <nav id="topnav">
    <div class="nav-brand">CELPIP <span>Cat Coach</span></div>
    <div class="nav-right">
      <button class="auth-btn auth-email" id="userEmail" onclick="signOutUser()" title="Sign out">Sign in</button>
      <div class="pill pill-level" id="lvPill">Lv 1 🌱</div>
      <div class="pill pill-streak">🔥 <span id="strN">0</span></div>

    let { error: stateError } = await db.from('user_state').upsert(userStateRow, { onConflict: 'user_id' })
    if (stateError && stateError.message.includes('vocab_order')) {
      delete userStateRow.vocab_order

      console.warn('vocab_order column missing; run the latest supabase_schema.sql to sync shuffled word order')
    }

    // batch upsert changed vocab statuses
    const rows = Object.entries(S.vocabProgress).map(([wid, status]) => ({
      user_id: UID, word_id: parseInt(wid), status,
      updated_at: new Date().toISOString()
    }))
    if (rows.length) {
      await db.from('vocab_status').upsert(rows, { onConflict: 'user_id,word_id' })
    }

    const mistakeRows = (S.mistakes || []).map(m => ({

async function syncPull() {
  if (!UID) return false
  setSyncStatus('busy')
  try {
    const today = todayStr()
    const [{ data: stateRow }, { data: progRow }, { data: vocabRows }, mistakesResult] = await Promise.all([

      S.readingBatch = stateRow.reading_batch || 0
      S.writingBatch = stateRow.writing_batch || 0
    }

    if (progRow && progRow.date === today) {

      S.wordsDone = progRow.words_done
      S.sessions = progRow.sessions || {1:'pending',2:'locked',3:'locked'}

    if (vocabRows && vocabRows.length) {

    }

    save()
    setSyncStatus('ok')
    return Boolean(stateRow || progRow || (vocabRows && vocabRows.length) || (mistakesResult.data && mistakesResult.data.length))
  } catch(e) {
    console.warn('sync pull failed', e)
    setSyncStatus('err')
    return false
  }
}

function sayArg(text) { return encodeURIComponent(text || '') }

window.speakText = function(encodedText) {
  const text = decodeURIComponent(encodedText || '').trim()
  if (!text || !('speechSynthesis' in window)) return
  window.speechSynthesis.cancel()
  const u = new SpeechSynthesisUtterance(text)
  u.lang = 'en-CA'
  u.rate = 0.9
  window.speechSynthesis.speak(u)
}

function shuffle(arr) {
  const a = [...arr]
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1))
    ;[a[i], a[j]] = [a[j], a[i]]
  }
  return a
}

function ensureVocabOrder() {
  const ids = VOCAB.map(v => v.id)
  const known = new Set(ids)
  const current = Array.isArray(S.vocabOrder) ? S.vocabOrder.filter(id => known.has(id)) : []
  const missing = ids.filter(id => !current.includes(id))
  if (current.length !== ids.length) {
    S.vocabOrder = [...current, ...shuffle(missing)]
    save()
  }
}

function orderedVocab() {
  ensureVocabOrder()
  const byId = new Map(VOCAB.map(v => [v.id, v]))
  return S.vocabOrder.map(id => byId.get(id)).filter(Boolean)
}

function posKey(pos) {
  return (pos || '').split(/[/.]/)[0].trim()
}

function wordById(id) {
  return VOCAB.find(v => v.id === Number(id))
}

function getVocabPool(status) {
  return Object.entries(S.vocabProgress)
    .filter(([, st]) => st === status)
    .map(([id]) => wordById(id))
    .filter(Boolean)
}

function buildOptions(v) {
  const samePos = VOCAB.filter(w =>
    w.id !== v.id &&
    posKey(w.pos) === posKey(v.pos) &&
    (w.category === v.category || Math.abs((w.difficulty || 1) - (v.difficulty || 1)) <= 1)
  )
  const sameCategory = VOCAB.filter(w => w.id !== v.id && w.category === v.category)
  const fallback = VOCAB.filter(w => w.id !== v.id)
  const picks = []
  ;[samePos, sameCategory, fallback].forEach(pool => {
    shuffle(pool).forEach(w => {
      if (picks.length < 3 && !picks.includes(w.word)) picks.push(w.word)
    })
  })
  ;(v.options || []).forEach(o => {
    if (picks.length < 3 && o !== v.word && !picks.includes(o)) picks.push(o)
  })
  return shuffle([v.word, ...picks.slice(0, 3)]).map(text => ({ text, correct: text === v.word }))
}

function buildVocabQuiz() {
  const today = QS.words.map(w => ({ word: w, source: 'today' }))
  const reviewing = shuffle(getVocabPool('reviewing'))
    .filter(w => !QS.words.some(nw => nw.id === w.id))
    .slice(0, 2)
    .map(w => ({ word: w, source: 'review' }))
  const mastered = shuffle(getVocabPool('mastered'))
    .filter(w => !QS.words.some(nw => nw.id === w.id))
    .slice(0, 1)
    .map(w => ({ word: w, source: 'mastered' }))
  return shuffle([...today, ...reviewing, ...mastered]).slice(0, 8).map((item, i) => {
    const type = i % 3 === 1 ? 'meaning' : 'blank'
    const v = item.word
    return {
      word: v,
      source: item.source,
      type,
      prompt: type === 'meaning'
        ? `Which word best matches this meaning: ${v.zh}?`
        : `Fill in the blank:\n${v.question}`,
      options: buildOptions(v),
      audio: type === 'meaning' ? v.word : v.question.replace(/_+/g, v.word),
    }
  })
}

function formatVPrompt(q) {
  if (q.type === 'blank') {
    return `Fill in the blank:<br><em>${q.word.question}</em>`
  }
  return q.prompt
}

function startVocab(panel) {
  const start = (S.vocabBatch*5) % Math.max(VOCAB.length,1)
  const words = orderedVocab()
  QS.words = Array.from({length:5},(_,i)=>words[(start+i)%words.length])
  QS.correct=0; QS.qIdx=0; QS.studyIdx=0; QS.answered={}
  QS.quiz = buildVocabQuiz()
  renderVStudy(panel, 0)
}

      <button class="btn btn-p" onclick="nextVStudy()" style="margin-bottom:0">${idx<QS.words.length-1?'Next Word →':'Start Mixed Quiz ✓'}</button>

}

window.nextVStudy = function() {
  const panel = document.getElementById('qpanel')
  if (QS.studyIdx < QS.words.length - 1) renderVStudy(panel, QS.studyIdx + 1)
  else showVQuiz(0)
}

function showVQuiz(qi) {
  QS.qIdx = qi
  const q = QS.quiz[qi]
  const L = ['A','B','C','D']
  const correct = q.options.findIndex(o => o.correct)
  const opts = q.options.map((o,i) => `
    <button class="opt" id="vo${i}" onclick="ansV(${i},${correct},${qi})">
      <span class="ol">${L[i]}</span>${o.text}
    </button>`).join('')
  const panel = document.getElementById('qpanel')
  panel.innerHTML = `
    <div class="card glow">
      <div class="qtop"><span class="qtag">📚 Quiz</span><button class="qclose" onclick="closeQ()">×</button></div>
      <div class="pbar"><div class="pt"><div class="pf" style="width:${qi/QS.quiz.length*100}%"></div></div><span class="plbl">${qi+1}/${QS.quiz.length}</span></div>
      <div class="qhead">
        <div class="qtext">${formatVPrompt(q)}</div>
        <button class="speak-btn" title="Read question" onclick="speakText('${sayArg(q.audio)}')">🔊</button>
      </div>
      <div class="opts">${opts}</div>
      <div id="vfb" class="fb"></div>
      <button id="vnxt" class="nxt" onclick="nxtV(${qi})">${qi<QS.quiz.length-1?'Next →':'Finish ✓'}</button>
    </div>`
}
window.showVQuiz = showVQuiz

window.ansV = function(chosen,correct,qi) {
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true)
  document.getElementById('vo'+correct).classList.add('correct')
  const fb=document.getElementById('vfb')
  const q = QS.quiz[qi]
  const wid = q.word.id
  if(chosen===correct){
    document.getElementById('vo'+chosen).classList.add('correct')
    fb.className='fb ok'; fb.textContent='✓ Correct! +5 XP'
    QS.correct++; addXP(5)
    const cur=S.vocabProgress[wid]||'new'
    S.vocabProgress[wid] = cur==='new'?'reviewing':cur==='reviewing'?'mastered':cur
  } else {
    document.getElementById('vo'+chosen).classList.add('wrong')
    fb.className='fb no'
    fb.textContent=`✗ Correct: ${'ABCD'[correct]} (${q.word.word}). Study the example sentence.`
    if(!S.vocabProgress[wid]) S.vocabProgress[wid] = 'reviewing'
    recordMistake({
      area:'vocabulary',
      kind:'choice',
      word_id:wid,
      word:q.word.word,
      question:q.prompt || q.word.question,
      chosen:q.options[chosen]?.text,
      correct:q.options[correct]?.text,
      details:`Chose ${'ABCD'[chosen]} instead of ${'ABCD'[correct]} in vocabulary quiz.`,
    })
  }
  document.getElementById('vnxt').style.display='block'
  save()
}

window.nxtV = function(qi) {
  if(qi<QS.quiz.length-1){ showVQuiz(qi+1) }
  else {
    S.wordsDone+=5; S.vocabBatch++; save()
    document.getElementById('qpanel').innerHTML=`
      <div class="card teal" style="text-align:center;padding:22px">
        <div style="font-size:38px;margin-bottom:10px">🎯</div>
        <div style="font-size:17px;font-weight:800;margin-bottom:5px">Vocabulary Complete!</div>
        <div style="font-size:13px;color:var(--t2);margin-bottom:15px">${QS.correct}/${QS.quiz.length} correct · +${QS.correct*5} XP</div>
        <button class="btn btn-p" style="margin:0" onclick="completeSession()">Mark Session 1 Complete →</button>
      </div>`
    renderHome()
  }
}

window.copyAIPrompt = function(type) {
  const box = document.getElementById('aiPromptBox')
  if (!box) return
  navigator.clipboard.writeText(box.textContent).then(() => {
    const btn = document.getElementById(type === 'reading' ? 'copyReadingBtn' : 'copyWritingBtn')
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => { btn.innerHTML = '📋 Copy Prompt' }, 2000) }
  })
}

function startReading(panel) {
  const pool = READING.length ? READING : CELPIP_READINGS
  if (S.readingBatch >= pool.length) {
    renderReadingAIPrompt(panel)
    return
  }
  QS.passage = pool[S.readingBatch % pool.length]
  QS.qIdx=0; QS.correct=0
  renderPassage(panel)
}

function buildPassageBody(r) {
  if (r.part === 2) {
    const head = r.tableHeaders.map(h=>`<th>${h}</th>`).join('')
    const rows = r.tableRows.map(row=>`<tr>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')
    const notes = r.notes ? `<div class="passage-notes"><strong>Notes:</strong><ul>${r.notes.map(n=>`<li>${n}</li>`).join('')}</ul></div>` : ''
    return `<div class="passage-table-wrap"><table class="passage-table"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>${notes}`
  }
  if (r.part === 4) {
    const intro = `<p class="passage-intro">${r.intro}</p>`
    const comments = r.comments.map(c=>`<div class="passage-comment"><span class="commenter">${c.name}:</span> ${c.text}</div>`).join('')
    return intro + comments
  }
  // Part 1 and Part 3: plain text
  return r.text.split('\n\n').map(p=>`<p>${p.trim()}</p>`).join('')
}

function renderPassage(panel) {
  const r=QS.passage
  const label = PART_LABELS[r.part] || `Part ${r.part}`
  const body = buildPassageBody(r)
  panel.innerHTML=`
    <div class="card glow">
      <div class="qtop"><span class="qtag">📖 ${label}</span><button class="qclose" onclick="closeQ()">×</button></div>
      <div class="pbar"><div class="pt"><div class="pf" id="rp" style="width:0%"></div></div><span class="plbl" id="rpl">Q 1/${r.questions.length}</span></div>
      <div class="passage"><div class="ptitle">${r.title}</div><div class="pbody">${body}</div></div>
      <div id="rqw"></div>
    </div>`
  renderRQ(0)
}

function renderRQ(qi) {
  const q=QS.passage.questions[qi]
  const L=['A','B','C','D']
  const opts=q.opts.map((o,i)=>`
    <button class="opt" id="ro${qi}_${i}" onclick="ansR(${qi},${i},${q.ans})">
      <span class="ol">${L[i]}</span>${o}
    </button>`).join('')
  document.getElementById('rp').style.width=(qi/QS.passage.questions.length*100)+'%'
  document.getElementById('rpl').textContent=`Q ${qi+1}/${QS.passage.questions.length}`
  document.getElementById('rqw').innerHTML=`
    <div class="qtext"><strong>Q${qi+1}.</strong> ${q.q}</div>
    <div class="opts">${opts}</div>
    <div id="rfb${qi}" class="fb"></div>
    <button id="rnxt${qi}" class="nxt" onclick="nxtR(${qi})">${qi<QS.passage.questions.length-1?'Next →':'Finish ✓'}</button>`
}

window.ansR = function(qi,chosen,correct) {
  for(let i=0;i<4;i++){const b=document.getElementById(`ro${qi}_${i}`);if(b)b.disabled=true}
  document.getElementById(`ro${qi}_${correct}`).classList.add('correct')
  const fb=document.getElementById(`rfb${qi}`)
  if(chosen===correct){
    document.getElementById(`ro${qi}_${chosen}`).classList.add('correct')
    fb.className='fb ok'; fb.textContent='✓ Correct! +8 XP'
    QS.correct++; addXP(8)
  } else {
    document.getElementById(`ro${qi}_${chosen}`).classList.add('wrong')
    fb.className='fb no'; fb.textContent=`✗ Correct: ${'ABCD'[correct]}.`
    const q=QS.passage.questions[qi]
    recordMistake({
      area:'reading',
      kind:'choice',
      question:q.q,
      chosen:q.opts[chosen],
      correct:q.opts[correct],
      details:`Chose ${'ABCD'[chosen]} instead of ${'ABCD'[correct]} in reading passage "${QS.passage.title}".`,
    })
  }
  document.getElementById(`rnxt${qi}`).style.display='block'
}

window.nxtR = function(qi) {
  if(qi<QS.passage.questions.length-1){ renderRQ(qi+1) }
  else {
    S.readingBatch++; save()
    document.getElementById('qpanel').innerHTML=`
      <div class="card teal" style="text-align:center;padding:22px">
        <div style="font-size:38px;margin-bottom:10px">📖</div>
        <div style="font-size:17px;font-weight:800;margin-bottom:5px">Reading Complete!</div>
        <div style="font-size:13px;color:var(--t2);margin-bottom:15px">${QS.correct}/${QS.passage.questions.length} correct · +${QS.correct*8} XP</div>
        <button class="btn btn-p" style="margin:0" onclick="completeSession()">Mark Session 2 Complete →</button>
      </div>`
    renderHome()
  }
}

window.updWC = function() {
  const t=(document.getElementById('wta')||{}).value||''
  const c=t.trim()?t.trim().split(/\s+/).length:0
  const el=document.getElementById('wcl')
  if(!el) return
  el.textContent=c+' words'
  el.className='wc'+(c>=150&&c<=200?' good':c>200?' warn':'')
}

function cleanWords(text) {
  return text.toLowerCase().replace(/[^a-z\s']/g,' ').split(/\s+/).filter(Boolean)
}

function hasAny(text, terms) {
  const low = text.toLowerCase()
  return terms.some(t => low.includes(t))
}

function clampScore(n) {
  return Math.max(1, Math.min(12, Math.round(n)))
}

function scoreWriting(text, wc, w) {
  const low = text.toLowerCase()
  const words = cleanWords(text)
  const sentences = text.split(/[.!?]+/).map(s=>s.trim()).filter(Boolean)
  const paragraphs = text.split(/\n+/).map(p=>p.trim()).filter(Boolean)
  const uniq = new Set(words).size
  const variety = words.length ? uniq / words.length : 0
  const connectors = ['because','however','therefore','for example','for instance','as a result','in addition','first','second','finally','although']
  const connectorCount = connectors.filter(c => low.includes(c)).length
  const coverage = (w.checks || []).filter(c => low.includes(c)).length
  const coverageRatio = (w.checks || []).length ? coverage / w.checks.length : 0
  const hasGreeting = /^(dear|hello|hi)\b/m.test(low)
  const hasClosing = /(sincerely|regards|thank you|best regards|kind regards)/.test(low)
  const hasRequest = /(could you|would you|please|i would appreciate|request|refund|replace|repair|fix|information)/.test(low)
  const hasOpinion = /(i believe|i think|in my opinion|i support|i oppose|i prefer|my view)/.test(low)
  const hasExample = /(for example|for instance|such as|in my experience)/.test(low)
  const avgSentence = sentences.length ? wc / sentences.length : wc
  const longSentence = sentences.some(s => cleanWords(s).length > 34)

  let cc = 5 + Math.min(3, paragraphs.length) + Math.min(2, connectorCount) + Math.round(coverageRatio*2)
  let voc = 5 + (variety > .68 ? 3 : variety > .55 ? 2 : 0) + Math.min(2, connectorCount) + (coverageRatio > .6 ? 1 : 0)
  let rd = 5 + (sentences.length >= 4 ? 2 : 0) + (avgSentence >= 10 && avgSentence <= 26 ? 2 : 0) + (!longSentence ? 1 : 0) + ((text.match(/[.!?]/g)||[]).length >= 4 ? 1 : 0)
  let tf = 4 + (wc >= 150 && wc <= 200 ? 3 : wc >= 120 && wc <= 230 ? 2 : 0) + Math.round(coverageRatio*3)

  if (w.type === 'task1') {
    tf += hasGreeting ? 1 : 0
    tf += hasClosing ? 1 : 0
    tf += hasRequest ? 1 : 0
    cc += hasRequest ? 1 : 0
  } else {
    tf += hasOpinion ? 2 : 0
    cc += hasOpinion ? 1 : 0
    cc += hasExample ? 1 : 0
  }

  return {
    cc:clampScore(cc), voc:clampScore(voc), rd:clampScore(rd), tf:clampScore(tf),
    checks:{paragraphs, connectorCount, coverage, coverageRatio, hasGreeting, hasClosing, hasRequest, hasOpinion, hasExample, avgSentence, longSentence, variety}
  }
}

window.submitW = function() {
  const ta=document.getElementById('wta')
  if(!ta) return
  const text=ta.value.trim()
  const wc=text?text.split(/\s+/).length:0
  if(wc<30){alert('Please write at least a few sentences.');return}
  document.getElementById('wsubBtn').disabled=true
  document.getElementById('wta').disabled=true
  const scored = scoreWriting(text, wc, QS.prompt)
  QS.submittedText = text
  QS.submittedWc = wc
  QS.submittedScores = scored
  const {cc,voc,rd,tf} = scored
  const c = scored.checks
  const tot=cc+voc+rd+tf
  const cl=n=>n>=9?'hi':n>=7?'mid':'lo'
  const tips=[]
  const writingMistakes=[]
  if(wc<150) {
    tips.push('📝 A bit short. Aim for 150–200 words to fully address all points.')
    writingMistakes.push({kind:'writing_task_fulfillment',details:`Writing was ${wc} words; target is 150–200 words.`})
  } else if(wc>200) {
    tips.push('📝 A bit long. CELPIP writing expects a focused 150–200 word response.')
    writingMistakes.push({kind:'writing_task_fulfillment',details:`Writing was ${wc} words; target is 150–200 words.`})
  }
  if(c.paragraphs.length < 2) {
    tips.push('📝 Break your writing into clear paragraphs (opening, body, closing).')
    writingMistakes.push({kind:'writing_coherence',details:'Writing did not include enough paragraph structure.'})
  }
  if(c.coverageRatio < .5) {
    tips.push('📝 Cover more task details. Several required points were not clearly mentioned.')
    writingMistakes.push({kind:'writing_task_fulfillment',details:'Several prompt-specific required details were missing.'})
  }
  if(QS.prompt.type==='task1' && (!c.hasGreeting || !c.hasClosing)) {
    tips.push('📝 For Task 1, include a clear greeting and closing to match email format.')
    writingMistakes.push({kind:'writing_task_fulfillment',details:'Task 1 email format was incomplete: missing greeting or closing.'})
  }
  if(QS.prompt.type==='task2' && !c.hasOpinion) {
    tips.push('📝 For Task 2, state your opinion clearly near the beginning.')
    writingMistakes.push({kind:'writing_coherence',details:'Task 2 response did not clearly state a position.'})
  }
  if(c.connectorCount < 2) {
    tips.push('📝 Add connectors such as however, for example, as a result, and in addition.')
    writingMistakes.push({kind:'writing_coherence',details:'Few linking words or transition phrases were used.'})
  }
  if(c.variety<0.6) {
    tips.push('📝 Some words are repeated. Try using synonyms to show vocabulary range.')
    writingMistakes.push({kind:'writing_vocabulary',details:'Vocabulary variety was low; repeated words appeared often.'})
  }
  if(c.longSentence || c.avgSentence > 28) {
    tips.push('📝 Some sentences are too long. Split long ideas into clearer sentences.')
    writingMistakes.push({kind:'writing_readability',details:'Average sentence length was high or at least one sentence was too long.'})
  }
  writingMistakes.forEach(m => recordMistake({
    area:'writing',
    kind:m.kind,
    question:QS.prompt?.id || QS.prompt?.type || 'Writing task',
    chosen:null,
    correct:null,
    details:m.details,
  }))
  const tipHTML=tips.map(t=>`<div class="tip">${t}</div>`).join('')
  document.getElementById('wfb').innerHTML=`
    <div class="sgrid">
      <div class="scell"><div class="sdim">Content & Coherence</div><div class="sn ${cl(cc)}">${cc}<span class="of">/12</span></div></div>
      <div class="scell"><div class="sdim">Vocabulary</div><div class="sn ${cl(voc)}">${voc}<span class="of">/12</span></div></div>
      <div class="scell"><div class="sdim">Readability</div><div class="sn ${cl(rd)}">${rd}<span class="of">/12</span></div></div>
      <div class="scell"><div class="sdim">Task Fulfillment</div><div class="sn ${cl(tf)}">${tf}<span class="of">/12</span></div></div>
    </div>
    <div class="stot">
      <div class="n" style="color:${tot>=36?'var(--green)':tot>=28?'var(--gold)':'var(--red)'}">${tot}<span class="of">/48</span></div>
      <div class="lbl">Total Score</div>
    </div>
    ${tipHTML}
    <button class="btn btn-o" id="copyWFeedbackBtn" onclick="copyWritingFeedbackPrompt()" style="margin-top:8px;margin-bottom:6px">📋 Copy Deep Feedback Prompt → Paste into Claude</button>
    <button class="btn btn-p" onclick="completeSession()" style="margin-bottom:0">Mark Session 3 Complete →</button>`
  S.writingBatch++; addXP(20); save(); renderHome()
}

function buildWritingFeedbackPrompt(text, wc, w, scores) {
  const {cc, voc, rd, tf} = scores
  const tot = cc + voc + rd + tf
  const taskLabel = w.type === 'task1' ? 'Task 1 — Email Writing' : 'Task 2 — Opinion Writing'
  const pts = (w.points || []).map((p,i) => `  ${i+1}. ${p}`).join('\n')

  let extra = ''
  if (w.relationship || w.tone) {
    extra += '\nCONTEXT'
    if (w.relationship) extra += `\nRelationship: ${w.relationship}`
    if (w.tone) extra += `\nExpected tone: ${w.tone}`
  }
  if (w.rubricHints) {
    extra += '\nRUBRIC HINTS (from question designer)'
    if (w.rubricHints.content?.length) extra += `\nContent must cover: ${w.rubricHints.content.join('; ')}`
    if (w.rubricHints.tone) extra += `\nTone note: ${w.rubricHints.tone}`
    if (w.rubricHints.taskFulfillment?.length) extra += `\nTask fulfillment: ${w.rubricHints.taskFulfillment.join('; ')}`
  }
  if (w.benchmarkAnswer) {
    extra += `\n\nBENCHMARK ANSWER (approximate ${w.benchmarkLevel || 'CLB 8'}):\n${w.benchmarkAnswer}`
  }

  return `You are a strict CELPIP writing examiner. Score and give detailed feedback on the student response below.

TASK: ${taskLabel}
SITUATION: ${w.situation}
REQUIRED POINTS:
${pts}${extra}

QUICK RULE-BASED SCORES (for reference only — these are automated, not your scores):
  Content & Coherence: ${cc}/12
  Vocabulary:          ${voc}/12
  Readability:         ${rd}/12
  Task Fulfillment:    ${tf}/12
  Total:               ${tot}/48
WORD COUNT: ${wc}

STUDENT RESPONSE:
${text}

Please provide:
1. Your own score for each of the four CELPIP dimensions (Content & Coherence, Vocabulary, Readability, Task Fulfillment), each out of 12, with a one-sentence justification.
2. Overall total and estimated CELPIP band (CLB 6 / 7 / 8 / 9 / 10+).
3. Exactly 3 specific improvement suggestions, each with the original sentence → a revised version.
4. One sentence on the single most important thing to fix next time.

Be strict. CLB 9+ requires consistent grammar accuracy, natural vocabulary range, appropriate tone, and complete task fulfillment. Do not inflate scores.`
}

window.copyWritingFeedbackPrompt = function() {
  const text = QS.submittedText
  const wc = QS.submittedWc
  const scored = QS.submittedScores
  if (!text || !scored) return
  const prompt = buildWritingFeedbackPrompt(text, wc, QS.prompt, scored)
  const btn = document.getElementById('copyWFeedbackBtn')
  navigator.clipboard.writeText(prompt).then(() => {
    if (btn) { btn.textContent = '✓ Copied! Paste into claude.ai'; setTimeout(() => { btn.textContent = '📋 Copy Deep Feedback Prompt → Paste into Claude' }, 3000) }
  }).catch(() => {
    if (btn) { btn.textContent = '✗ Copy failed — try again'; setTimeout(() => { btn.textContent = '📋 Copy Deep Feedback Prompt → Paste into Claude' }, 3000) }
  })
}

// ── COMPLETE / CLOSE ──────────────────────────────────────────────────────
const REWARDS = [
  {e:'🎯',t:'Vocabulary Done!',m:"You're building your word bank one session at a time. Keep it up!"},
  {e:'📖',t:'Reading Done!',m:'Your comprehension skills are sharpening. Every passage counts.'},
  {e:'✍️',t:'Writing Done!',m:"That's the hardest session. You showed up — that's everything."},
]

window.completeSession = function() {
  const s=getActive()
  if(!s) return
  const r=REWARDS[s.id-1]
  addXP(s.xp)
  S.sessions[s.id]='done'
  if(s.id<3) S.sessions[s.id+1]='pending'
  if(S.sessions[1]==='done'&&S.sessions[2]==='done'&&S.sessions[3]==='done'){
    if(!S.completedDates.includes(TODAY_STR)){S.completedDates.push(TODAY_STR); S.streak++}
  }
  save()
  syncPush()
  renderHome()
  closeQ()
  shootConfetti()
  showReward(r.e,r.t,'+'+s.xp+' XP',r.m)
}

window.closeQ = function() {
  const p=document.getElementById('qpanel')
  if(p){p.className='';p.innerHTML=''}
  const sb=document.getElementById('startBtn')
  if(sb) sb.disabled=false
}

// ── XP ────────────────────────────────────────────────────────────────────
function addXP(n){ S.xpToday+=n; S.xpTotal+=n; save(); updateNav() }

// ── REWARD ────────────────────────────────────────────────────────────────
function showReward(e,t,x,m){
  document.getElementById('rE').textContent=e
  document.getElementById('rT').textContent=t
  document.getElementById('rX').textContent=x
  document.getElementById('rM').textContent=m
  document.getElementById('overlay').classList.add('show')
}
window.closeReward = function(){ document.getElementById('overlay').classList.remove('show') }

// ── CONFETTI ──────────────────────────────────────────────────────────────
function shootConfetti(){
  const c=document.getElementById('cnf')
  const cols=['#f47c5c','#ffb36b','#ffd166','#43b895','#f6a6b2','#d9962f']
  for(let i=0;i<60;i++){
    const el=document.createElement('div')
    el.className='cp'
    const dur=(Math.random()*1.5+1.2).toFixed(2)
    el.style.cssText=`left:${Math.random()*100}vw;width:${rng(5,10)}px;height:${rng(5,10)}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation:fall ${dur}s linear ${(Math.random()*.5).toFixed(2)}s forwards`
    c.appendChild(el)
    setTimeout(()=>el.remove(),(parseFloat(dur)*1000+600))
  }
}

function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}

// ── PROGRESS TAB ──────────────────────────────────────────────────────────
function mistakeLabel(m) {
  if (m.area === 'vocabulary') return 'Vocabulary choice'
  if (m.area === 'reading') return 'Reading choice'
  if (m.kind === 'writing_task_fulfillment') return 'Writing task fulfillment'
  if (m.kind === 'writing_coherence') return 'Writing coherence'
  if (m.kind === 'writing_vocabulary') return 'Writing vocabulary'
  if (m.kind === 'writing_readability') return 'Writing readability'
  return 'Writing feedback'
}

function shortDate(iso) {
  try { return new Date(iso).toLocaleDateString([], { month:'short', day:'numeric' }) }
  catch { return '' }
}

function renderMistakes() {
  const rows = (S.mistakes || []).slice(0, 8).map(m => {
    const subject = m.word ? `<strong>${m.word}</strong> · ` : ''
    const answer = m.chosen ? ` You chose "${m.chosen}"${m.correct ? `; correct was "${m.correct}".` : '.'}` : ''
    return `<div class="mrow">
      <div class="mtop"><span class="mkind">${mistakeLabel(m)}</span><span class="mdate">${shortDate(m.date)}</span></div>
      <div class="mdetail">${subject}${m.details || ''}${answer}</div>
    </div>`
  }).join('')
  return rows || `<div class="card"><div style="font-size:13px;color:var(--t2);line-height:1.5">No mistakes recorded yet. Once you miss a quiz question or receive writing feedback, it will appear here.</div></div>`
}

function renderProgress(){
  const lv=getLevel(S.xpTotal)
  const pct=getLvPct(S.xpTotal)
  const xpNext=(LEVELS[Math.min(lv+1,LEVELS.length-1)].xp-S.xpTotal)
  const badges=LEVELS.map((l,i)=>`
    <div class="lvb ${lv>=i?'ok':''}">
      <div class="li">${l.icon}</div>
      <div class="ln">${l.name}</div>
    </div>`).join('')
  const cal=Array.from({length:28},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(27-i))
    const ds=d.toISOString().split('T')[0]
    return `<div class="cc ${S.completedDates.includes(ds)?'full':''}" title="${ds}"></div>`
  }).join('')
  const tot=Object.keys(S.vocabProgress).length
  const mas=Object.values(S.vocabProgress).filter(v=>v==='mastered').length
  const rev=Object.values(S.vocabProgress).filter(v=>v==='reviewing').length
  document.getElementById('vProgress').innerHTML=`
    <div class="sec">Level Progress</div>
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:11px">
        <div style="font-size:36px">${LEVELS[lv].icon}</div>
        <div>
          <div style="font-size:17px;font-weight:800">Level ${lv+1} — ${LEVELS[lv].name}</div>
          <div style="font-size:12px;color:var(--t2)">${S.xpTotal} XP${lv<LEVELS.length-1?' · '+xpNext+' XP to next':' · Max!'}</div>
        </div>
      </div>
      <div class="lv-track"><div class="lv-fill" style="width:${pct}%"></div></div>
      <div class="lvbadges">${badges}</div>
    </div>
    <div class="sec">Streak & Activity</div>
    <div class="stats">
      <div class="stat"><div class="stat-n" style="color:var(--gold)">${S.streak}</div><div class="stat-l">Streak</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--teal)">${S.completedDates.length}</div><div class="stat-l">Days Done</div></div>
      <div class="stat"><div class="stat-n">${S.xpTotal}</div><div class="stat-l">Total XP</div></div>
    </div>
    <div class="card">
      <div style="font-size:11px;color:var(--t3);margin-bottom:7px">Last 28 Days</div>
      <div class="cal">${cal}</div>
    </div>
    <div class="sec">Vocabulary Stats</div>
    <div class="stats">
      <div class="stat"><div class="stat-n" style="color:var(--green)">${mas}</div><div class="stat-l">Mastered</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--gold)">${rev}</div><div class="stat-l">Reviewing</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--t3)">${VOCAB.length-tot}</div><div class="stat-l">New</div></div>
    </div>
    <div class="sec">Recent Mistakes</div>
    ${renderMistakes()}
  `
}

// ── VOCAB TAB ─────────────────────────────────────────────────────────────
let vCat='all'
const CATS={all:'All',daily:'Daily',workplace:'Work',academic:'Academic',civic:'Civic',health:'Health',consumer:'Consumer'}

window.setVCat = function(c){ vCat=c; renderVocab() }

function renderVocab(){
  const tabs=Object.entries(CATS).map(([k,v])=>`
    <button class="ctab ${vCat===k?'active':''}" onclick="setVCat('${k}')">${v}</button>`).join('')
  const words=orderedVocab().filter(v=>vCat==='all'||v.category===vCat).slice(0,100)
  const rows=words.map(v=>{
    const st=S.vocabProgress[v.id]||'new'
    const dc=st==='mastered'?'dm':st==='reviewing'?'dr':'dn'
    return `<div class="vrow">
      <div class="vdot ${dc}"></div>
      <div style="flex:1"><div class="vword">${v.word}</div><div class="vzh">${v.zh}</div></div>
      <span style="font-size:10px;background:var(--s3);color:var(--t3);padding:2px 7px;border-radius:10px">${v.pos}</span>
    </div>`
  }).join('')
  document.getElementById('vVocab').innerHTML=`
    <div style="font-size:18px;font-weight:800;margin-bottom:3px">Word Bank</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:11px">${VOCAB.length} words · <span style="color:var(--green)">●</span> mastered <span style="color:var(--gold)">●</span> reviewing <span style="color:var(--t3)">●</span> new</div>
    <div class="cattabs">${tabs}</div>
    ${rows}
    ${words.length===100?`<div style="text-align:center;padding:10px;font-size:12px;color:var(--t3)">Showing first 100 words</div>`:''}
  `
}

// ── BOOT ──────────────────────────────────────────────────────────────────
async function init() {
  await loadData()
  const { data: { session } } = await db.auth.getSession()
  if (session?.user) await activateUser(session.user)
  else showAppForUser(null)

  db.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) await activateUser(session.user)
    else {
      UID = null
      CURRENT_USER = null
      showAppForUser(null)
    }
  })

  // Auto-push every 2 minutes
  setInterval(syncPush, 120_000)
}

init()
</script>
